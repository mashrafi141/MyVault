<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vault</title>

    <meta name="theme-color" content="#050816">

    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

    <!-- =========================
     SPLASH SCREEN
========================= -->

    <section id="splash-screen" class="screen active">

        <div class="logo-container">

            <div class="vault-logo">

                <i class="fa-solid fa-shield-halved"></i>

            </div>

            <h1>VAULT</h1>

            <p>
                Private Media Vault
            </p>

        </div>

    </section>

    <!-- =========================
     CREATE PIN
========================= -->

    <section id="create-pin-screen" class="screen">

        <div class="auth-wrapper">

            <div class="auth-card">

                <div class="auth-icon">

                    <i class="fa-solid fa-lock"></i>

                </div>

                <h2>Create PIN</h2>

                <p>
                    Create your secure vault PIN
                </p>

                <input id="create-pin" type="password" maxlength="4" placeholder="Enter 4 Digit PIN">

                <input id="confirm-pin" type="password" maxlength="4" placeholder="Confirm PIN">

                <button id="create-pin-btn">

                    <i class="fa-solid fa-arrow-right"></i>

                    Continue

                </button>

            </div>

        </div>

    </section>

    <!-- =========================
     LOGIN
========================= -->

    <section id="login-screen" class="screen">

        <div class="auth-wrapper">

            <div class="auth-card">

                <div class="auth-icon">

                    <i class="fa-solid fa-fingerprint"></i>

                </div>

                <h2>Unlock Vault</h2>

                <p>
                    Enter your PIN
                </p>

                <input id="login-pin" type="password" maxlength="4" placeholder="••••">

                <button id="login-btn">

                    <i class="fa-solid fa-unlock"></i>

                    Unlock

                </button>

            </div>

        </div>

    </section>

    <!-- =========================
     DASHBOARD
========================= -->

    <section id="dashboard-screen" class="screen">

        <!-- HEADER -->

        <header class="topbar">

            <div>

                <h1>Vault</h1>

                <span id="vault-status">
                    No Folder Connected
                </span>

            </div>

            <button id="settings-btn" class="icon-btn">

                <i class="fa-solid fa-gear"></i>

            </button>

        </header>

        <!-- CONTENT -->

        <main>

            <!-- HERO CARD -->

            <div class="hero-card">

                <div class="hero-left">

                    <span id="vault-badge" class="vault-badge disconnected">
                        <span class="status-dot"></span>

                        No Folder Connected
                    </span>

                    <h2 id="vault-folder-name">
                        No Folder Connected
                    </h2>

                    <p id="vault-folder-info">
                        Select your vault folder
                    </p>

                </div>

                <div class="hero-icon">

                    <i class="fa-solid fa-shield"></i>

                </div>

            </div>

            <div class="action-area">

                <button id="connect-folder-btn" class="primary-btn">

                    <i class="fa-solid fa-folder-open"></i>

                    Select Vault Folder

                </button>

            </div>

            <!-- STATS -->

            <div class="stats-grid">

                <div class="stat-card">

                    <i class="fa-solid fa-folder"></i>

                    <h3 id="folder-count">
                        0
                    </h3>

                    <span>
                        Folders
                    </span>

                </div>

                <div class="stat-card">

                    <i class="fa-solid fa-image"></i>

                    <h3 id="photo-count">
                        0
                    </h3>

                    <span>
                        Photos
                    </span>

                </div>

                <div class="stat-card">

                    <i class="fa-solid fa-video"></i>

                    <h3 id="video-count">
                        0
                    </h3>

                    <span>
                        Videos
                    </span>

                </div>

            </div>

            <!-- SECTION TITLE -->

            <div class="section-title">

                <h3>
                    Hidden Folders
                </h3>

            </div>

            <!-- FOLDERS -->

            <div id="folder-grid">

                <!-- generated -->

            </div>

        </main>

        <!-- BOTTOM NAV -->

        <nav class="bottom-nav">

            <button class="nav-btn active">
                <i class="fa-solid fa-folder"></i>
            </button>

            <button class="nav-btn">
                <i class="fa-solid fa-image"></i>
            </button>

            <button class="nav-btn">
                <i class="fa-solid fa-video"></i>
            </button>

            <button class="nav-btn">
                <i class="fa-solid fa-user-shield"></i>
            </button>

        </nav>

    </section>


    <!-- =========================
     MEDIA SCREEN
========================= -->

    <section id="media-screen" class="screen">

        <div class="media-header">

            <button id="back-to-dashboard" class="icon-btn">
                <i class="fa-solid fa-arrow-left"></i>
            </button>

            <h2 id="media-title">
                Folder
            </h2>

        </div>

        <div id="media-grid" class="media-grid">

        </div>

    </section>

    <script src="assets/js/auth.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/scanner.js"></script>
    <script src="assets/js/gallery.js"></script>
    <script src="assets/js/player.js"></script>
    <script src="assets/js/app.js"></script>

</body>

</html>
